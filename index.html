<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>眼鏡祭 自己紹介カードメーカー</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#111;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif}header{padding:14px}h1{font-size:20px;margin:0 0 6px}.note{font-size:12px;color:#ccc;line-height:1.55;margin:0}main{display:grid;grid-template-columns:minmax(0,430px) minmax(0,1fr);gap:12px;padding:10px;align-items:start}@media(max-width:980px){main{grid-template-columns:1fr}}.box{background:#f6f6f6;color:#111;border-radius:14px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.25)}label{display:block;font-weight:700;font-size:13px;margin:10px 0 4px}input[type=text],textarea{display:block;width:100%;max-width:100%;font-size:16px;padding:10px;border:1px solid #ccc;border-radius:10px;background:#fff;color:#111}textarea{min-height:68px;resize:vertical}.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}@media(max-width:520px){.row{grid-template-columns:1fr}}.checks{display:flex;flex-wrap:wrap;gap:6px}.checks label{margin:0;border:1px solid #ccc;border-radius:999px;background:#fff;padding:7px 10px;font-size:14px}.btn{border:0;border-radius:10px;background:#fff;color:#111;font-weight:800;padding:10px 12px;margin:6px 6px 0 0}.primary{background:#39d353}canvas{display:block;width:100%;height:auto;background:#000;border-radius:12px}.group{margin-bottom:10px}.small{font-size:12px;color:#666;line-height:1.5;margin-top:8px}
</style>
</head>
<body>
<header><h1>眼鏡祭 自己紹介カードメーカー 👓</h1><p class="note">眼鏡祭自己紹介カードの簡易入力フォームです。</p></header>
<main>
<section class="box">
<div class="row"><div class="group"><label>名前</label><input id="name" type="text" placeholder="例：ペルソナ太郎"></div><div class="group"><label>ID</label><input id="handle" type="text" placeholder="例：@persona_taro"></div></div>
<label>I’m...</label><div class="checks" id="tags"></div>
<div class="row"><div class="group"><label>アイコン画像</label><input id="iconFile" type="file" accept="image/*"></div></div>
<label>好きな作品ベスト3</label><div id="works"></div>
<label>最愛キャラ</label><input id="favorite" type="text" placeholder="アトラス作品で好きなキャラ">
<label>最愛キャラ画像</label><input id="favFile" type="file" accept="image/*"><button class="btn" type="button" id="clearFavImage">最愛キャラ画像を削除</button><p class="small">最終表示サイズは約 760×190px です。画像はカード上で半透明（50%程度）で表示されます。</p>
<label>同担</label><div class="checks" id="sameFan"></div><textarea id="sameFanText" placeholder="同担についての補足など"></textarea>
<label>男女CP</label><div class="checks" id="hetCp"></div><textarea id="hetText" placeholder="推しカプ、補足など"></textarea>
<label>BL/GLCP</label><div class="checks" id="blglCp"></div><textarea id="blglText" placeholder="推しカプ、補足など"></textarea>
<label>フリースペース</label><textarea id="freeText" placeholder="自由に書いてください"></textarea>
<label>フリースペース画像</label><input id="freeFile" type="file" accept="image/*"><button class="btn" type="button" id="clearFreeImage">フリースペース画像を削除</button>
<div><button class="btn primary" id="savePng">共有 / 写真に保存</button><button class="btn" id="openPng">画像を新規表示</button><button class="btn" id="saveJson">JSON保存</button><label class="btn" style="display:inline-block;cursor:pointer">JSON読込<input id="loadJson" type="file" accept="application/json" style="display:none"></label><button class="btn" id="clearAll">入力をクリア</button></div>
<a id="downloadLink" download="megane-fes-card.png" style="display:none">PNG</a><p class="small">iPhoneでは「共有 / 写真に保存」から共有シートを開き、「画像を保存」を選んでください。</p><p class="small">背景テンプレート作成：<a href="https://x.com/ayattuji" target="_blank" rel="noopener">@綾辻.jp</a> さん（Xアカウント: @ayattuji）。素敵なテンプレートをありがとうございます。</p>
</section>
<section><canvas id="canvas" width="1220" height="1886"></canvas></section>
</main>
<script>
const TEMPLATE_URL='template.jpeg';
const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
const bg=new Image();bg.src=TEMPLATE_URL;bg.onload=draw;
const tags=['ゲーマー','レイヤー','文字書き','絵描き'],prefs=['スキ','フツウ','ニガテ'];
const state={name:'',handle:'',tags:[],works:['','',''],reasons:['','',''],favorite:'',sameFan:'',sameFanText:'',hetCp:'',hetText:'',blglCp:'',blglText:'',freeText:'',icon:null,fav:null,free:null};
const $=id=>document.getElementById(id);
function setupChecks(rootId,defs,key,multi=false){const root=$(rootId);root.innerHTML='';defs.forEach(v=>{const label=document.createElement('label'),input=document.createElement('input');input.type=multi?'checkbox':'radio';input.name=key;input.value=v;input.addEventListener('change',()=>{state[key]=multi?[...root.querySelectorAll('input:checked')].map(x=>x.value):v;persist();draw()});label.append(input,document.createTextNode(v));root.appendChild(label)})}
setupChecks('tags',tags,'tags',true);setupChecks('sameFan',prefs,'sameFan');setupChecks('hetCp',prefs,'hetCp');setupChecks('blglCp',prefs,'blglCp');
for(let i=0;i<3;i++)$('works').insertAdjacentHTML('beforeend',`<div class="group"><input id="work${i}" type="text" placeholder="${i+1}. 作品名"><textarea id="reason${i}" placeholder="理由・推しキャラなど"></textarea></div>`);
['name','handle','favorite','sameFanText','hetText','blglText','freeText'].forEach(id=>$(id).addEventListener('input',e=>{state[id]=e.target.value;persist();draw()}));
for(let i=0;i<3;i++){$(`work${i}`).addEventListener('input',e=>{state.works[i]=e.target.value;persist();draw()});$(`reason${i}`).addEventListener('input',e=>{state.reasons[i]=e.target.value;persist();draw()})}
function loadImg(file,cb){if(!file)return;const r=new FileReader();r.onload=()=>{const im=new Image();im.onload=()=>cb({data:r.result,img:im});im.src=r.result};r.readAsDataURL(file)}
$('iconFile').onchange=e=>loadImg(e.target.files[0],v=>{state.icon=v;persist();draw()});$('favFile').onchange=e=>loadImg(e.target.files[0],v=>{state.fav=v;persist();draw()});$('freeFile').onchange=e=>loadImg(e.target.files[0],v=>{state.free=v;persist();draw()});
function clearImageField(key,inputId){state[key]=null;$(inputId).value='';persist();draw()}
$('clearFavImage').onclick=()=>clearImageField('fav','favFile');$('clearFreeImage').onclick=()=>clearImageField('free','freeFile');
function persist(){localStorage.setItem('meganeFesCardOverlayV5',JSON.stringify({...state,icon:state.icon?.data||null,fav:state.fav?.data||null,free:state.free?.data||null}))}
function restore(){const raw=localStorage.getItem('meganeFesCardOverlayV5');if(!raw)return;try{Object.assign(state,JSON.parse(raw));['icon','fav','free'].forEach(k=>{if(typeof state[k]==='string'&&state[k]){const im=new Image();im.onload=draw;im.src=state[k];state[k]={data:state[k],img:im}}});syncForm()}catch(e){}}
function syncForm(){['name','handle','favorite','sameFanText','hetText','blglText','freeText'].forEach(id=>$(id).value=state[id]||'');for(let i=0;i<3;i++){$(`work${i}`).value=state.works[i]||'';$(`reason${i}`).value=state.reasons[i]||''}document.querySelectorAll('input[type=checkbox],input[type=radio]').forEach(input=>{const v=state[input.name];input.checked=Array.isArray(v)?v.includes(input.value):v===input.value})}
function setFont(size,weight=900){ctx.font=`${weight} ${size}px Hiragino Sans, Yu Gothic, sans-serif`}
function fitText(s,x,y,maxW,size,weight=900,color='#111'){for(let n=size;n>=16;n-=2){setFont(n,weight);if(ctx.measureText(s).width<=maxW||n===16){ctx.fillStyle=color;ctx.fillText(s,x,y);break}}}
function fitTextCenter(s,x,y,maxW,size,weight=900,color='#111'){ctx.save();for(let n=size;n>=16;n-=2){setFont(n,weight);if(ctx.measureText(s).width<=maxW||n===16){ctx.fillStyle=color;ctx.textAlign='center';ctx.fillText(s,x+maxW/2,y);break}}ctx.restore()}
function fitWrapText(s,x,y,maxW,maxH,startSize=34,minSize=4,weight=900,color='#111'){const text=String(s||'');function buildLines(size){setFont(size,weight);const lines=[];for(const paragraph of text.split(/\n/)){if(paragraph===''){lines.push('');continue}let line='';for(const ch of paragraph){const test=line+ch;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=ch}else line=test}if(line)lines.push(line)}return lines}let chosenSize=minSize,chosenLines=[];for(let size=startSize;size>=minSize;size--){const lineH=Math.ceil(size*1.25),lines=buildLines(size),totalH=lines.length*lineH;if(totalH<=maxH){chosenSize=size;chosenLines=lines;break}}if(chosenLines.length===0)chosenLines=buildLines(chosenSize);const lineH=Math.ceil(chosenSize*1.25),totalH=chosenLines.length*lineH,startY=y+Math.max(0,(maxH-totalH)/2);setFont(chosenSize,weight);ctx.fillStyle=color;chosenLines.forEach((line,i)=>ctx.fillText(line,x,startY+i*lineH))}
function wrapText(s,x,y,maxW,size,lineH,maxLines=3,weight=800,color='#111'){setFont(size,weight);ctx.fillStyle=color;let yy=y,used=0;for(const part of String(s||'').split(/\n/)){let line='';for(const ch of part){const t=line+ch;if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,yy);yy+=lineH;used++;if(used>=maxLines)return;line=ch}else line=t}ctx.fillText(line,x,yy);yy+=lineH;used++;if(used>=maxLines)return}}
function drawCoverImage(obj,x,y,w,h,circle=false,alpha=1){if(!obj?.img)return;ctx.save();ctx.globalAlpha=alpha;ctx.beginPath();if(circle)ctx.arc(x+w/2,y+h/2,Math.min(w,h)/2,0,Math.PI*2);else ctx.rect(x,y,w,h);ctx.clip();const s=Math.max(w/obj.img.width,h/obj.img.height),dw=obj.img.width*s,dh=obj.img.height*s;ctx.drawImage(obj.img,x+(w-dw)/2,y+(h-dh)/2,dw,dh);ctx.restore()}
function circleMark(x,y,w,h){ctx.strokeStyle='red';ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,w*.48,h*.46,-0.18,0,Math.PI*2);ctx.stroke()}
function draw(){if(!bg.complete)return;ctx.clearRect(0,0,cv.width,cv.height);ctx.drawImage(bg,0,0,cv.width,cv.height);fitText(state.name||'',170,280,255,45,900,'#111');fitText(state.handle||'',430,280,160,30,500,'#111');const tagCircles={'ゲーマー':[165,350,200,90],'レイヤー':[390,350,200,90],'文字書き':[165,440,200,90],'絵描き':[390,440,200,90]};state.tags.forEach(t=>{const p=tagCircles[t];if(p)circleMark(...p)});drawCoverImage(state.icon,772,100,360,360,true);const workY=[640,765,890];const reasonY=[620,750,880];for(let i=0;i<3;i++){fitText(state.works[i]||'',210,workY[i],345,36,900,'#111');wrapText(state.reasons[i]||'',650,reasonY[i],355,23,27,3,800,'#111')}drawCoverImage(state.fav,245,1001,760,190,false,0.5);fitTextCenter(state.favorite||'',70,1140,1100,70,900,'#111');const prefBoxes=[{key:'sameFan',textKey:'sameFanText',commentX:66,commentY:1434,commentW:220,positions:{'スキ':[55,1296,55,60],'フツウ':[145,1296,55,60],'ニガテ':[235,1296,55,60]}},{key:'hetCp',textKey:'hetText',commentX:345,commentY:1430,commentW:390,positions:{'スキ':[430,1290,55,60],'フツウ':[520,1290,55,60],'ニガテ':[610,1290,55,60]}},{key:'blglCp',textKey:'blglText',commentX:790,commentY:1425,commentW:390,positions:{'スキ':[870,1290,55,60],'フツウ':[960,1290,55,60],'ニガテ':[1050,1290,55,60]}}];prefBoxes.forEach(box=>{const p=box.positions[state[box.key]];if(p)circleMark(...p);wrapText(state[box.textKey]||'',box.commentX,box.commentY,box.commentW,20,24,3,800,'#111')});drawCoverImage(state.free,55,1600,380,210,false);fitWrapText(state.freeText||'',58,1610,1100,300,72,18,900,'#111')}
async function shareOrSavePng(){cv.toBlob(async blob=>{if(!blob)return;const file=new File([blob],'megane-fes-card.png',{type:'image/png'});if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title:'眼鏡祭自己紹介カード'});return}catch(e){if(e&&e.name==='AbortError')return;}}const url=URL.createObjectURL(blob),w=window.open();if(w)w.document.write(`<img src="${url}" style="max-width:100%;height:auto">`);else location.href=url},'image/png')}
$('savePng').onclick=shareOrSavePng;$('openPng').onclick=()=>{const url=cv.toDataURL('image/png'),w=window.open();if(w)w.document.write(`<img src="${url}" style="max-width:100%">`);else location.href=url};$('saveJson').onclick=()=>{const data={...state,icon:state.icon?.data||null,fav:state.fav?.data||null,free:state.free?.data||null},a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='megane-fes-card.json';a.click()};$('loadJson').onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{Object.assign(state,JSON.parse(r.result));['icon','fav','free'].forEach(k=>{if(typeof state[k]==='string'&&state[k]){const im=new Image();im.onload=draw;im.src=state[k];state[k]={data:state[k],img:im}}});syncForm();persist();draw()}catch(err){}};r.readAsText(file)};$('clearAll').onclick=()=>{if(confirm('入力をクリアしますか？')){localStorage.removeItem('meganeFesCardOverlayV5');location.reload()}};restore();
</script>
</body>
</html>
